service DataReplicationService{
    rpc batchMessage(BatchMessage) returns (BoolResponse){}
    rpc lockObject(LockRequest)returns (BoolResponse){}
    rpc unlockObject(UnLockRequest)returns (BoolResponse){}
    rpc setTtl(TtlRequest)returns (BoolResponse){}
    rpc updateValue(UpdateRequest) returns (BoolResponse){}
    rpc createKeyValue(CreateRequest) returns (BoolResponse){}
    rpc remove(GetRequest) returns (BoolResponse){}
    rpc createList(CreateListRequest) returns (BoolResponse){}
    rpc createQueue(CreateQueueRequest) returns (BoolResponse){}
    rpc removeTail(GetRequest) returns (BoolResponse){}
    rpc removeHead(GetRequest) returns (BoolResponse){}
    rpc removeElementAtPosition(KeyPositionRequest) returns (BoolResponse){}
    rpc removeElementInRange(KeyRangeRequest) returns (stream BoolResponse){}
    rpc addElementToTail(AddToRequest) returns (BoolResponse){}
    rpc addElementToHead(AddToRequest) returns (BoolResponse){}
    rpc addElementToPosition(AddToRequest) returns (BoolResponse){}
}

service FastCacheGrpcService{    
    rpc lockObject(LockRequest)returns (LockResponse){}
    rpc unlockObject(UnLockRequest)returns (UnlockResponse){}
    rpc setTtl(TtlRequest)returns (BoolResponse){}    
    rpc getTtl(GetRequest)returns (TtlResponse){}
    rpc getValue(GetRequest) returns (ValueResponse){}
    rpc getAndDeleteValue(GetRequest) returns (ValueResponse){}
    rpc existKey(GetRequest) returns (BoolResponse){}
    rpc updateValue(UpdateRequest) returns (UpdateValueResponse){}
    rpc createKeyValue(CreateRequest) returns (KeyHintResponse){}
    rpc remove(GetRequest) returns (BoolResponse){}
    
    rpc createList(CreateListRequest) returns (KeyHintResponse){} 
    rpc createQueue(CreateQueueRequest) returns (KeyHintResponse){} 
    rpc getList(GetRequest) returns (stream BatchValueResponse){}
    rpc getVector(GetRequest) returns (stream BatchValueResponse){}
    rpc getAndRemoveFront(GetRequest) returns (ValueResponse){}
    rpc getTail(GetRequest) returns (ValueResponse){}
    rpc getHead(GetRequest) returns (ValueResponse){}
    rpc getAndRemoveTail(GetRequest) returns (ValueResponse){}
    rpc getElementAtPosition(KeyPositionRequest) returns (ValueResponse){}
    rpc getAndRemoveElementAtPosition(KeyPositionRequest) returns (ValueResponse){}
    rpc getElementInRange(KeyPositionRequest) returns (stream BatchValueResponse){}
    rpc getElementInRangeVector(KeyPositionRequest) returns (stream BatchValueResponse){}
    rpc removeTail(GetRequest) returns (BoolResponse){}
    rpc removeHead(GetRequest) returns (BoolResponse){}
    rpc removeElementAtPosition(KeyPositionRequest) returns (BoolResponse){}
    rpc addElementToTail(AddToRequest) returns (BoolResponse){}
    rpc addElementToHead(AddToRequest) returns (BoolResponse){}
    rpc addElementToPosition(AddToRequest) returns (BoolResponse){}
    
    

}